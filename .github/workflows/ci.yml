name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: go test (${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.23.x"
          - "1.26.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Unit tests
        run: |
          go test ./...
          for module in data/gorm data/ent web/gin web/echo web/fiber web/kratos rpc/grpc; do
            (cd "$module" && go test ./...)
          done

      - name: Example smoke tests
        run: |
          (cd examples/quickstart && go run .)
          (cd examples/gin-gorm && go run .)
          (cd examples/grpc && go run .)
          (cd examples/ent && go run .)

      - name: Race tests
        run: |
          go test -race ./...
          for module in data/gorm data/ent web/gin web/echo web/fiber web/kratos rpc/grpc; do
            (cd "$module" && go test -race ./...)
          done

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - "."
          - data/gorm
          - data/ent
          - web/gin
          - web/echo
          - web/fiber
          - web/kratos
          - rpc/grpc
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0
          working-directory: ${{ matrix.module }}
