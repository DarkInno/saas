name: ci

on:
  push:
    branches:
      - main
      - master
  pull_request:

permissions:
  contents: read

jobs:
  core:
    name: core (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version:
          - "1.22.x"
          - "1.23.x"
          - "1.26.x"
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Check core module tidiness
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Go vet
        run: go vet ./...

      - name: Unit tests
        run: go test ./...

      - name: Race tests
        run: go test -race ./...

  optional-go122:
    name: optional modules (Go 1.22)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.22.x"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum
      - name: Test Go 1.22 adapters
        shell: bash
        run: |
          for module in data/gorm web/gin web/fiber web/kratos; do
            (
              cd "$module"
              go mod tidy
              git diff --exit-code -- go.mod go.sum
              go vet ./...
              go test ./...
              go test -race ./...
            )
          done

  optional-go123:
    name: optional modules (Go 1.23)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum
      - name: Test Go 1.23 adapters
        shell: bash
        run: |
          for module in data/ent web/echo rpc/grpc obs/otel biz/notification/ses; do
            (
              cd "$module"
              go mod tidy
              git diff --exit-code -- go.mod go.sum
              go vet ./...
              go test ./...
              go test -race ./...
            )
          done

  optional-go124:
    name: optional modules (Go 1.24)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum
      - name: Test Go 1.24 adapters and database contracts
        shell: bash
        run: |
          for module in cache/redis biz/identity/oidc tests/db; do
            (
              cd "$module"
              go mod tidy
              git diff --exit-code -- go.mod go.sum
              go vet ./...
              go test ./...
              go test -race ./...
            )
          done

  examples:
    name: examples (Go ${{ matrix.go-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - go-version: "1.22.x"
            modules: "examples/quickstart examples/gin-gorm"
          - go-version: "1.23.x"
            modules: "examples/grpc examples/ent"
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum
      - name: Test and run examples
        shell: bash
        run: |
          for module in ${{ matrix.modules }}; do
            (
              cd "$module"
              go mod tidy
              git diff --exit-code -- go.mod go.sum
              go test ./...
              go run .
            )
          done

  lint:
    name: golangci-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Run golangci-lint on the core module
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.9.0

  vuln:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum

      - name: Run govulncheck for every published module
        shell: bash
        run: |
          for module in . data/gorm data/ent web/gin web/echo web/fiber web/kratos rpc/grpc cache/redis obs/otel biz/identity/oidc biz/notification/ses; do
            (
              cd "$module"
              go run golang.org/x/vuln/cmd/govulncheck@v1.5.0 ./...
            )
          done

  integration:
    name: integration (mysql, postgres, redis)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum
      - name: Run disposable integration tests with SQL-contract coverage
        shell: pwsh
        run: |
          $sqlContractCoverageProfile = Join-Path $env:RUNNER_TEMP 'saas-sql-contract-coverage.out'
          ./tests/run-integration.ps1 -CoverageProfile $sqlContractCoverageProfile
          go -C tests/coverage tool cover "-func=$sqlContractCoverageProfile" | Out-File -FilePath "$sqlContractCoverageProfile.txt" -Encoding utf8
      - name: Upload SQL-contract coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: saas-sql-contract-coverage
          path: |
            ${{ runner.temp }}/saas-sql-contract-coverage.out
            ${{ runner.temp }}/saas-sql-contract-coverage.out.txt
          if-no-files-found: error

  coverage:
    name: coverage
    needs: integration
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
          cache: true
          cache-dependency-path: |
            go.sum
            **/go.sum
      - name: Download SQL-contract coverage
        uses: actions/download-artifact@v4
        with:
          name: saas-sql-contract-coverage
          path: ${{ runner.temp }}/saas-sql-contract-coverage
      - name: Generate merged multi-module coverage profile
        shell: pwsh
        run: |
          $sqlContractCoverageProfile = Join-Path $env:RUNNER_TEMP 'saas-sql-contract-coverage/saas-sql-contract-coverage.out'
          $coverageProfile = Join-Path $env:RUNNER_TEMP 'saas-coverage.out'
          ./tests/run-coverage.ps1 -Output $coverageProfile -IntegrationProfile $sqlContractCoverageProfile
      - name: Enforce coverage floor
        shell: pwsh
        run: |
          $coverageProfile = Join-Path $env:RUNNER_TEMP 'saas-coverage.out'
          ./tests/check-coverage.ps1 -Profile $coverageProfile -Minimum 85
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: saas-coverage
          path: |
            ${{ runner.temp }}/saas-coverage.out
            ${{ runner.temp }}/saas-coverage.out.txt
            ${{ runner.temp }}/saas-module-coverage
          if-no-files-found: error
